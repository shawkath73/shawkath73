name: Generate Pacman
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
jobs:
  pacman:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: hugomd/pacman-contribution-graph@v1.1.0
        with:
          github_user_name: shawkath73
          output_folder: dist
      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
